# car-finder-il :: scheduled scan
# Runs your criteria a couple of times a day and pushes ONLY new matches /
# price drops to your phone. Reads-only — no login, no posting.
#
# Setup (repo → Settings → Secrets and variables → Actions):
#   APIFY_TOKEN        your Apify token
#   APIFY_ACTOR_ID     a Yad2 vehicles actor id from apify.com/store
#   SUPABASE_URL       https://<ref>.supabase.co
#   SUPABASE_KEY       service_role key (kept secret, server-side only)
#   WAAI_WEBHOOK_URL   your wa-ai webhook  (or set TELEGRAM_* / NTFY_TOPIC)
#
# Edit the cron and the criteria path/matrix below to taste.

name: car-finder

"on":
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC ≈ 08:00–09:00 Israel
    - cron: "0 16 * * *"   # 16:00 UTC ≈ 18:00–19:00 Israel
  workflow_dispatch: {}    # manual "Run workflow" button

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        criteria:
          - examples/criteria.example.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run scan
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WAAI_WEBHOOK_URL: ${{ secrets.WAAI_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 scripts/carfinder.py run "${{ matrix.criteria }}"
