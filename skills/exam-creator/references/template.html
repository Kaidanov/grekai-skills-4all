<!DOCTYPE html>
<!--
  exam-creator template — a self-contained, single-file study/exam app.
  HOW TO USE: edit the EXAM object below (meta + questions). Everything else
  (XP/levels/badges, localStorage, TTS, scoring, all 4 question types) is generic
  and should be left alone. No build step, no external dependencies, no CDN.
  Open by double-click or drop the file on https://app.netlify.com/drop .
  Default is Hebrew RTL; for LTR/English set meta.lang/meta.dir below.
-->
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>תבנית מבחן — exam-creator</title>
<style>
  :root{
    --bg:#0f1226; --card:#1b1f3b; --card2:#232a52; --ink:#f4f6ff; --muted:#aab0d6;
    --accent:#7c8bff; --accent2:#4f46e5; --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
    --ring:#a5b4fc; --line:#2c3160; --radius:16px; --tap:48px;
  }
  /* light mode for users who prefer it */
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f6ff; --card:#ffffff; --card2:#eef1ff; --ink:#15183a; --muted:#5b6088;
           --accent:#4f46e5; --accent2:#4338ca; --ring:#4f46e5; --line:#dfe3ff; }
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink); font-size:17px; line-height:1.55;
    font-family:system-ui,-apple-system,"Segoe UI",Rubik,Arial,"Noto Sans Hebrew",sans-serif;
    -webkit-text-size-adjust:100%; padding:max(12px,env(safe-area-inset-top)) 12px 96px;
  }
  .wrap{ max-width:680px; margin:0 auto; }
  /* ---- top status bar: XP / level / streak ---- */
  .hud{ position:sticky; top:0; z-index:5; background:var(--bg);
        padding:10px 0 8px; border-bottom:1px solid var(--line); margin-bottom:14px; }
  .hud-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .badge-lvl{ background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
        border-radius:999px; padding:4px 12px; font-weight:700; font-size:14px; white-space:nowrap; }
  .xpbar{ flex:1; min-width:140px; height:12px; background:var(--card2); border-radius:999px; overflow:hidden; }
  .xpbar>i{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--good));
        transition:width .5s cubic-bezier(.2,.8,.2,1); }
  .xptext{ font-size:13px; color:var(--muted); white-space:nowrap; }
  .streak{ font-size:14px; font-weight:700; color:var(--warn); white-space:nowrap; }
  /* ---- cards ---- */
  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
        padding:18px; margin:0 0 14px; box-shadow:0 6px 22px rgba(0,0,0,.18); }
  h1{ font-size:1.35rem; margin:.1em 0 .2em; }
  .sub{ color:var(--muted); font-size:.95rem; margin:0 0 6px; }
  .qmeta{ color:var(--muted); font-size:.85rem; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .qprompt{ font-size:1.15rem; font-weight:600; margin:8px 0 14px; }
  /* ---- answer controls ---- */
  .opts{ display:grid; gap:10px; }
  .opt{ display:flex; align-items:center; gap:10px; min-height:var(--tap); padding:12px 14px;
        background:var(--card2); border:2px solid transparent; border-radius:12px; cursor:pointer;
        text-align:start; width:100%; color:inherit; font:inherit; transition:border-color .15s,background .15s; }
  .opt:hover{ border-color:var(--accent); }
  .opt:focus-visible,.btn:focus-visible,input:focus-visible{ outline:3px solid var(--ring); outline-offset:2px; }
  .opt .key{ font-size:.8rem; color:var(--muted); border:1px solid var(--line); border-radius:6px;
        min-width:24px; height:24px; display:inline-grid; place-items:center; }
  .opt.correct{ border-color:var(--good); background:rgba(34,197,94,.14); }
  .opt.wrong{ border-color:var(--bad); background:rgba(239,68,68,.14); }
  .opt[aria-disabled="true"]{ cursor:default; }
  input[type=text],input[type=number]{ width:100%; min-height:var(--tap); padding:12px 14px; font:inherit;
        background:var(--card2); color:inherit; border:2px solid var(--line); border-radius:12px; }
  .btn{ min-height:var(--tap); padding:12px 20px; border-radius:12px; border:0; cursor:pointer;
        font:inherit; font-weight:700; background:var(--accent2); color:#fff; }
  .btn.ghost{ background:transparent; color:var(--ink); border:2px solid var(--line); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:14px; }
  .spacer{ flex:1; }
  /* ---- feedback ---- */
  .fb{ margin-top:14px; padding:12px 14px; border-radius:12px; font-size:.98rem; display:none; }
  .fb.show{ display:block; }
  .fb.ok{ background:rgba(34,197,94,.14); border:1px solid var(--good); }
  .fb.no{ background:rgba(239,68,68,.14); border:1px solid var(--bad); }
  .fb b{ display:block; margin-bottom:4px; }
  .tts{ background:transparent; border:1px solid var(--line); border-radius:999px; min-height:36px;
        padding:4px 12px; color:var(--muted); cursor:pointer; font:inherit; font-size:.85rem; }
  .tts[hidden]{ display:none; }
  /* ---- badges & summary ---- */
  .badges{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .chip{ background:var(--card2); border:1px solid var(--line); border-radius:999px; padding:6px 12px;
        font-size:.85rem; display:inline-flex; gap:6px; align-items:center; }
  .chip.locked{ opacity:.4; }
  .big{ font-size:2.4rem; font-weight:800; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0; }
  .stat{ background:var(--card2); border-radius:12px; padding:12px; text-align:center; }
  .stat .n{ font-size:1.6rem; font-weight:800; }
  .stat .l{ color:var(--muted); font-size:.82rem; }
  .toast{ position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(20px);
        background:var(--card); border:1px solid var(--accent); border-radius:12px; padding:12px 18px;
        box-shadow:0 10px 30px rgba(0,0,0,.3); opacity:0; transition:.35s; z-index:20; max-width:92vw; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .flag{ background:rgba(245,158,11,.14); border:1px solid var(--warn); color:var(--ink);
        border-radius:10px; padding:8px 12px; font-size:.85rem; margin-bottom:12px; }
  /* ---- formula helpers (no MathJax/KaTeX — pure CSS/HTML/unicode) ---- */
  .frac{ display:inline-flex; flex-direction:column; vertical-align:middle; text-align:center; margin:0 .15em; }
  .frac>span{ padding:0 .3em; }
  .frac>.den{ border-top:1.5px solid currentColor; }
  sub,sup{ font-size:.72em; line-height:0; }
  .sqrt{ border-top:1.5px solid currentColor; padding:0 .2em; }
  .sqrt::before{ content:"√"; border-top:0; margin-inline-end:-.1em; }
  .nowrap{ white-space:nowrap; }
  .visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
  .muted{ color:var(--muted); }
  a{ color:var(--accent); }
  @media (max-width:420px){ body{ font-size:16px; } .grid2{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <!-- HUD: XP / level / streak (filled by the engine) -->
  <div class="hud" id="hud">
    <div class="hud-row">
      <span class="badge-lvl" id="lvl">רמה 1</span>
      <div class="xpbar"><i id="xpfill"></i></div>
      <span class="xptext" id="xptext">0 XP</span>
      <span class="streak" id="streak" hidden>🔥 0</span>
    </div>
  </div>
  <main id="app" aria-live="polite"></main>
</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* =========================================================================
   EXAM CONFIG — this is the ONLY part the generator edits.
   See references/question-schema.md for every field and question type.
   ========================================================================= */
const EXAM = {
  meta: {
    id: "demo-grade8-math-he",     // localStorage namespace — make unique per app
    title: "תבנית מבחן לדוגמה",
    subtitle: "מתמטיקה · כיתה ח׳ · דמו",
    lang: "he",                     // "he", "en", ...
    dir: "rtl",                     // "rtl" or "ltr"
    passingScore: 60,               // % needed to pass
    shuffleQuestions: false,
    shuffleChoices: false,
    tts: true,                      // master switch for Hebrew/other TTS readout
    generatedNote: ""               // if questions were AI-generated, set the review flag text here
  },
  questions: [
    {
      id: "q1", type: "mc", points: 10,
      prompt: "כמה זה 7 × 8?",
      tts: "כַּמָּה זֶה שֶׁבַע כָּפוּל שְׁמוֹנֶה?",
      choices: ["54", "56", "48", "63"],
      answer: 1,                    // index of the correct choice
      explanation: "7 × 8 = 56."
    },
    {
      id: "q2", type: "tf", points: 10,
      prompt: "המשוואה x + 5 = 12 פתרונה x = 7.",
      answer: true,
      explanation: "x = 12 − 5 = 7, נכון."
    },
    {
      id: "q3", type: "numeric", points: 10,
      prompt: 'מהי שטח מלבן שאורכו 6 ורוחבו 4 (בסמ"ר)?',
      answer: 24, tolerance: 0,
      unit: 'סמ"ר',
      explanation: "שטח מלבן = אורך × רוחב = 6 × 4 = 24."
    },
    {
      id: "q4", type: "numeric", points: 10,
      prompt: 'כמה זה <span class="frac"><span>1</span><span class="den">2</span></span> + <span class="frac"><span>1</span><span class="den">4</span></span> ? (כתבו כמספר עשרוני)',
      answer: 0.75, tolerance: 0.01,
      explanation: "חצי ועוד רבע = 0.5 + 0.25 = 0.75."
    },
    {
      id: "q5", type: "fill", points: 10,
      prompt: "השלימו: המספר הראשוני הקטן ביותר הוא ___",
      answer: ["2", "שתיים"],       // any of these is accepted (case/space-insensitive)
      explanation: "2 הוא המספר הראשוני הקטן ביותר (והיחיד הזוגי)."
    }
  ]
};

/* =========================================================================
   ENGINE — generic. Leave this alone when generating a new app.
   ========================================================================= */
(function(){
  "use strict";
  const M = EXAM.meta;
  document.documentElement.lang = M.lang || "he";
  document.documentElement.dir  = M.dir  || "rtl";
  document.title = M.title || "מבחן";

  const KEY = "examcreator:" + (M.id || "default");   // namespaced — apps never collide
  const $  = (s,r=document)=>r.querySelector(s);
  const app = $("#app"), toastEl = $("#toast");

  // ---- localStorage state (progress, XP, badges, best, resume) ----
  const FRESH = { xp:0, answers:{}, idx:0, badges:[], best:0, attempts:0, done:false };
  let S;
  try { S = Object.assign({}, FRESH, JSON.parse(localStorage.getItem(KEY) || "{}")); }
  catch(e){ S = Object.assign({}, FRESH); }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

  // ---- question order (optionally shuffled, persisted via stored idx) ----
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  let QS = EXAM.questions.slice();
  if (M.shuffleQuestions && S.attempts===0 && Object.keys(S.answers).length===0) QS = shuffle(QS);

  // ---- XP / levels ----
  const LVL_STEP = 100;                                   // 100 XP per level
  const level = ()=> Math.floor(S.xp / LVL_STEP) + 1;
  const intoLevel = ()=> S.xp % LVL_STEP;
  function renderHud(){
    $("#lvl").textContent = (M.lang==="en"?"Level ":"רמה ") + level();
    $("#xptext").textContent = S.xp + " XP";
    $("#xpfill").style.width = (intoLevel()/LVL_STEP*100) + "%";
    const st = $("#streak");
    if (streakCount>1){ st.hidden=false; st.textContent = "🔥 " + streakCount; } else st.hidden=true;
  }

  // ---- badges (milestones) ----
  const BADGES = {
    first:    {icon:"🌱", he:"צעד ראשון",   en:"First step"},
    streak3:  {icon:"🔥", he:"רצף 3",        en:"Streak 3"},
    streak5:  {icon:"⚡", he:"רצף 5",        en:"Streak 5"},
    half:     {icon:"📘", he:"חצי הדרך",     en:"Halfway"},
    finisher: {icon:"🏁", he:"סיימת מבחן",   en:"Finisher"},
    pass:     {icon:"✅", he:"עברת!",         en:"Passed"},
    perfect:  {icon:"🏆", he:"ציון מושלם",   en:"Perfect score"},
    comeback: {icon:"💪", he:"חזרת לתקן",     en:"Comeback"}
  };
  function award(id){
    if (S.badges.includes(id)) return;
    S.badges.push(id); save();
    const b = BADGES[id]; if(!b) return;
    toast(b.icon + " " + (M.lang==="en"?b.en:b.he));
  }
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(()=>toastEl.classList.remove("show"), 2200);
  }

  // ---- TTS (SpeechSynthesis) with graceful, silent fallback ----
  const TTS = (function(){
    const ok = M.tts && typeof speechSynthesis !== "undefined" && typeof SpeechSynthesisUtterance !== "undefined";
    function voiceFor(lang){
      try{
        const vs = speechSynthesis.getVoices() || [];
        const pre = (lang||"he").slice(0,2).toLowerCase();
        return vs.find(v=>(v.lang||"").toLowerCase().startsWith(pre)) || null;
      }catch(e){ return null; }
    }
    function available(lang){ return ok && !!voiceFor(lang); }
    function speak(text, lang){
      if(!ok || !text) return false;
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const v = voiceFor(lang); if(v){ u.voice=v; u.lang=v.lang; } else { u.lang = lang||"he-IL"; }
        u.rate = 0.95;
        speechSynthesis.speak(u);
        return true;
      }catch(e){ return false; }   // never throw, never block
    }
    // voices load async in some browsers
    if (ok) try{ speechSynthesis.onvoiceschanged = ()=>{}; }catch(e){}
    return { available, speak };
  })();

  // ---- scoring helpers per type ----
  function norm(s){ return String(s).trim().toLowerCase().replace(/\s+/g," "); }
  function checkFill(q,val){
    const accepted = Array.isArray(q.answer)? q.answer : [q.answer];
    return accepted.some(a=>norm(a)===norm(val));
  }
  function checkNumeric(q,val){
    const n = parseFloat(String(val).replace(",", "."));
    if (Number.isNaN(n)) return false;
    return Math.abs(n - q.answer) <= (q.tolerance||0) + 1e-9;   // +epsilon for float drift
  }

  // ---- runtime ----
  let streakCount = 0;
  let i = Math.min(S.idx||0, QS.length);   // resume where we left off

  function totalPoints(){ return QS.reduce((s,q)=>s+(q.points||10),0); }
  function earnedPoints(){
    return QS.reduce((s,q)=>{ const a=S.answers[q.id]; return s + (a&&a.correct?(q.points||10):0); },0);
  }
  function answeredCount(){ return Object.keys(S.answers).length; }

  function render(){
    renderHud();
    if (i >= QS.length){ return renderSummary(); }
    const q = QS[i];
    const prev = S.answers[q.id];
    const num = (M.lang==="en"?"Question ":"שאלה ") + (i+1) + " / " + QS.length;
    const ttsBtn = (TTS.available(M.lang))
      ? `<button class="tts" id="ttsBtn" type="button" aria-label="${M.lang==="en"?"Read aloud":"הקראה"}">🔊 ${M.lang==="en"?"Read":"הקראה"}</button>` : "";
    const flag = (i===0 && M.generatedNote)
      ? `<div class="flag">⚠️ ${esc(M.generatedNote)}</div>` : "";

    let body = "";
    if (q.type==="mc"){
      let choices = q.choices.map((c,idx)=>({c,idx}));
      body = `<div class="opts" role="group">` + choices.map(o=>{
        const k = o.idx+1;
        return `<button class="opt" type="button" data-idx="${o.idx}">
                  <span class="key">${k}</span><span>${q.choices[o.idx]}</span></button>`;
      }).join("") + `</div>`;
    } else if (q.type==="tf"){
      body = `<div class="opts" role="group">
                <button class="opt" type="button" data-tf="true"><span class="key">1</span><span>${M.lang==="en"?"True":"נכון"}</span></button>
                <button class="opt" type="button" data-tf="false"><span class="key">2</span><span>${M.lang==="en"?"False":"לא נכון"}</span></button>
              </div>`;
    } else if (q.type==="numeric"){
      body = `<input id="ans" type="number" step="any" inputmode="decimal"
                 aria-label="${M.lang==="en"?"Your answer":"התשובה שלך"}" autocomplete="off">
              ${q.unit?`<span class="muted"> ${esc(q.unit)}</span>`:""}
              <div class="row"><button class="btn" id="submit" type="button">${M.lang==="en"?"Check":"בדיקה"}</button></div>`;
    } else { // fill
      body = `<input id="ans" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
                 aria-label="${M.lang==="en"?"Your answer":"התשובה שלך"}">
              <div class="row"><button class="btn" id="submit" type="button">${M.lang==="en"?"Check":"בדיקה"}</button></div>`;
    }

    app.innerHTML = `
      <section class="card">
        ${flag}
        <div class="qmeta"><span>${num}</span><span>·</span><span>${q.points||10} XP</span>${ttsBtn?`<span class="spacer"></span>${ttsBtn}`:""}</div>
        <div class="qprompt">${q.prompt}</div>
        ${body}
        <div class="fb" id="fb" role="alert"></div>
        <div class="row" id="navrow" style="display:none">
          <span class="spacer"></span>
          <button class="btn" id="next" type="button">${i+1<QS.length?(M.lang==="en"?"Next →":"הבא →"):(M.lang==="en"?"Finish":"סיום")}</button>
        </div>
      </section>`;

    // wire TTS
    const tb = $("#ttsBtn");
    if (tb) tb.addEventListener("click", ()=>TTS.speak(q.tts || stripHtml(q.prompt), M.lang));

    // if already answered (resume), show locked feedback
    if (prev){ lockAnswer(q, prev.given, prev.correct, true); return; }

    // wire inputs
    if (q.type==="mc"){
      app.querySelectorAll(".opt").forEach(btn=>btn.addEventListener("click",()=>{
        grade(q, Number(btn.dataset.idx), btn);
      }));
    } else if (q.type==="tf"){
      app.querySelectorAll(".opt").forEach(btn=>btn.addEventListener("click",()=>{
        grade(q, btn.dataset.tf==="true", btn);
      }));
    } else {
      const submit = $("#submit"), input = $("#ans");
      const go = ()=>grade(q, input.value, null);
      submit.addEventListener("click", go);
      input.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); go(); }});
      input.focus();
    }
  }

  function grade(q, given, btn){
    let correct=false;
    if (q.type==="mc")        correct = (given === q.answer);
    else if (q.type==="tf")   correct = (given === !!q.answer);
    else if (q.type==="numeric") correct = checkNumeric(q, given);
    else                      correct = checkFill(q, given);

    const firstTime = !S.answers[q.id];
    S.answers[q.id] = { given, correct };
    if (firstTime && correct){ S.xp += (q.points||10); }
    // streak + badges
    if (correct){ streakCount++; } else { streakCount = 0; }
    if (correct) award("first");
    if (streakCount>=3) award("streak3");
    if (streakCount>=5) award("streak5");
    if (answeredCount() >= Math.ceil(QS.length/2)) award("half");
    save();
    lockAnswer(q, given, correct, false);
    renderHud();
  }

  function lockAnswer(q, given, correct, resumed){
    // disable controls, show correct/wrong, reveal explanation + next
    if (q.type==="mc"){
      app.querySelectorAll(".opt").forEach(b=>{
        b.setAttribute("aria-disabled","true"); b.style.pointerEvents="none";
        const idx=Number(b.dataset.idx);
        if (idx===q.answer) b.classList.add("correct");
        if (idx===given && !correct) b.classList.add("wrong");
      });
    } else if (q.type==="tf"){
      app.querySelectorAll(".opt").forEach(b=>{
        b.setAttribute("aria-disabled","true"); b.style.pointerEvents="none";
        const val=b.dataset.tf==="true";
        if (val=== !!q.answer) b.classList.add("correct");
        if (val===given && !correct) b.classList.add("wrong");
      });
    } else {
      const input=$("#ans"), submit=$("#submit");
      if (input){ input.value = (given!==undefined&&given!==null)?given:""; input.disabled=true; }
      if (submit){ submit.disabled=true; }
    }
    const fb=$("#fb");
    if (fb){
      fb.className = "fb show " + (correct?"ok":"no");
      const head = correct ? (M.lang==="en"?"Correct!":"נכון!") : (M.lang==="en"?"Not quite":"לא מדויק");
      let ans = "";
      if (!correct){
        let right;
        if (q.type==="mc") right = q.choices[q.answer];
        else if (q.type==="tf") right = q.answer ? (M.lang==="en"?"True":"נכון") : (M.lang==="en"?"False":"לא נכון");
        else if (q.type==="numeric") right = q.answer + (q.unit?(" "+q.unit):"");
        else right = (Array.isArray(q.answer)?q.answer[0]:q.answer);
        ans = `<div>${M.lang==="en"?"Answer":"התשובה"}: <b style="display:inline">${esc(String(right))}</b></div>`;
      }
      fb.innerHTML = `<b>${correct?"✅ ":"✏️ "}${head}</b>${ans}${q.explanation?`<div>${q.explanation}</div>`:""}`;
    }
    const nav=$("#navrow"); if(nav) nav.style.display="flex";
    const next=$("#next");
    if (next) next.addEventListener("click", ()=>{ i++; S.idx=i; save(); window.scrollTo(0,0); render(); }, {once:true});
    if (next) next.focus();
  }

  function renderSummary(){
    const earned = earnedPoints(), total = totalPoints();
    const pct = total? Math.round(earned/total*100) : 0;
    const passed = pct >= (M.passingScore||60);
    const correctN = QS.filter(q=>S.answers[q.id]&&S.answers[q.id].correct).length;

    if (!S.done){
      S.done = true; S.attempts = (S.attempts||0)+1;
      const prevBest = S.best||0; S.best = Math.max(prevBest, pct);
      award("finisher");
      if (passed) award("pass");
      if (pct===100) award("perfect");
      if (S.attempts>1 && pct>prevBest) award("comeback");
      save();
    }

    const badgeChips = Object.keys(BADGES).map(id=>{
      const b=BADGES[id], have=S.badges.includes(id);
      return `<span class="chip ${have?"":"locked"}">${b.icon} ${M.lang==="en"?b.en:b.he}</span>`;
    }).join("");

    app.innerHTML = `
      <section class="card" style="text-align:center">
        <div class="sub">${esc(M.title)}</div>
        <div class="big" style="color:${passed?"var(--good)":"var(--warn)"}">${pct}%</div>
        <div class="sub">${passed?(M.lang==="en"?"Passed 🎉":"עברת! 🎉"):(M.lang==="en"?"Keep practicing":"כדאי לתרגל עוד")}</div>
        <div class="grid2">
          <div class="stat"><div class="n">${correctN}/${QS.length}</div><div class="l">${M.lang==="en"?"Correct":"נכונות"}</div></div>
          <div class="stat"><div class="n">${S.xp}</div><div class="l">XP</div></div>
          <div class="stat"><div class="n">${level()}</div><div class="l">${M.lang==="en"?"Level":"רמה"}</div></div>
          <div class="stat"><div class="n">${S.best}%</div><div class="l">${M.lang==="en"?"Best":"שיא"}</div></div>
        </div>
        <div class="badges">${badgeChips}</div>
        <div class="row" style="justify-content:center">
          <button class="btn ghost" id="review" type="button">${M.lang==="en"?"Review answers":"סקירת תשובות"}</button>
          <button class="btn" id="retry" type="button">${M.lang==="en"?"Try again":"מבחן מחדש"}</button>
        </div>
      </section>`;

    $("#retry").addEventListener("click", ()=>{
      S.answers={}; S.idx=0; S.done=false; streakCount=0; i=0; save();
      if (M.shuffleQuestions) QS = shuffle(EXAM.questions.slice());
      window.scrollTo(0,0); render();
    });
    $("#review").addEventListener("click", renderReview);
  }

  function renderReview(){
    const rows = QS.map((q,n)=>{
      const a=S.answers[q.id]; const ok=a&&a.correct;
      let right;
      if (q.type==="mc") right=q.choices[q.answer];
      else if (q.type==="tf") right=q.answer?(M.lang==="en"?"True":"נכון"):(M.lang==="en"?"False":"לא נכון");
      else if (q.type==="numeric") right=q.answer+(q.unit?(" "+q.unit):"");
      else right=Array.isArray(q.answer)?q.answer.join(" / "):q.answer;
      return `<div class="card" style="margin-bottom:10px">
        <div class="qmeta"><span>${(M.lang==="en"?"Q":"שאלה ")+(n+1)}</span><span>${ok?"✅":"❌"}</span></div>
        <div class="qprompt" style="font-size:1rem">${q.prompt}</div>
        <div class="muted">${M.lang==="en"?"Correct answer":"תשובה נכונה"}: <b>${esc(String(right))}</b></div>
        ${q.explanation?`<div style="margin-top:6px">${q.explanation}</div>`:""}
      </div>`;
    }).join("");
    app.innerHTML = `<button class="btn ghost" id="back" type="button">← ${M.lang==="en"?"Back":"חזרה"}</button>
                     <div style="height:12px"></div>${rows}`;
    $("#back").addEventListener("click", renderSummary);
    window.scrollTo(0,0);
  }

  // ---- helpers ----
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function stripHtml(s){ const d=document.createElement("div"); d.innerHTML=s; return d.textContent||""; }

  // ---- keyboard: number keys pick choices anywhere ----
  document.addEventListener("keydown", e=>{
    if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
    const opts = app.querySelectorAll('.opt:not([aria-disabled="true"])');
    if (opts.length){
      const n = parseInt(e.key,10);
      if (n>=1 && n<=opts.length){ opts[n-1].click(); }
    }
    if (e.key==="Enter"){ const nx=$("#next"); if(nx){ nx.click(); } }
  });

  // resume toast
  if (answeredCount()>0 && !S.done){
    setTimeout(()=>toast(M.lang==="en"?"Resumed where you left off":"ממשיכים מהמקום שעצרת"), 400);
  }
  render();
})();
</script>
</body>
</html>
