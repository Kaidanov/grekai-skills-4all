<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 716" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Trip Planner flow: collect inputs (flights, stays, prefs, targets); enrich the target bank with Maps and Tripadvisor links, stars and distances via cached APIs at zero tokens; generate the plan deterministically (anchors, cluster, allocate, route, schedule, conflict checks); assemble the bundle (itinerary, scored target bank, budget); render the Excel workbook, HTML brochure and inline itinerary.">
  <rect x="1" y="1" width="478" height="714" rx="18" fill="#f4f8f8" stroke="#cfe0e3"/>
  <text x="240" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#16181d">Trip Planner</text>
  <text x="240" y="68" text-anchor="middle" font-size="13" fill="#5b6371">Deterministic core — AI only to parse docs &amp; write blurbs</text>

  <!-- 1. Inputs -->
  <rect x="28" y="86" width="424" height="70" rx="12" fill="#eef3fb" stroke="#cfe0f7"/>
  <text x="240" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Collect inputs</text>
  <text x="240" y="135" text-anchor="middle" font-size="12.5" fill="#5b6371">Flights · stays · prefs · candidate targets</text>
  <line x1="240" y1="156" x2="240" y2="184" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,177 247,177 240,185" fill="#9aa3b5"/>

  <!-- 2. Enrich -->
  <rect x="28" y="186" width="424" height="78" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="214" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Enrich the target bank</text>
  <text x="240" y="235" text-anchor="middle" font-size="12.5" fill="#5b6371">Maps / Tripadvisor links · stars · distance-from-base</text>
  <text x="240" y="253" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1F7A53">cached Places / Distance Matrix · 0 tokens</text>
  <line x1="240" y1="264" x2="240" y2="292" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,285 247,285 240,293" fill="#9aa3b5"/>

  <!-- 3. Generate plan -->
  <rect x="28" y="294" width="424" height="96" rx="12" fill="#fef3e9" stroke="#f3cda0" stroke-width="2"/>
  <text x="240" y="322" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Generate the plan (no AI)</text>
  <text x="240" y="343" text-anchor="middle" font-size="12.5" fill="#5b6371">anchors → cluster → allocate → route (NN + 2-opt)</text>
  <text x="240" y="361" text-anchor="middle" font-size="12.5" fill="#5b6371">→ schedule clock times → conflict checks</text>
  <text x="240" y="380" text-anchor="middle" font-size="11.5" font-weight="700" fill="#C2722A">car-after-flight · no-lodging · book-ahead</text>
  <line x1="240" y1="390" x2="240" y2="418" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,411 247,411 240,419" fill="#9aa3b5"/>

  <!-- 4. Assemble bundle -->
  <rect x="28" y="420" width="424" height="70" rx="12" fill="#eef3fb" stroke="#cfe0f7"/>
  <text x="240" y="448" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Assemble the bundle</text>
  <text x="240" y="469" text-anchor="middle" font-size="12.5" fill="#5b6371">Itinerary · scored target bank · live budget</text>
  <line x1="240" y1="490" x2="240" y2="518" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,511 247,511 240,519" fill="#9aa3b5"/>

  <!-- 5. Render outputs -->
  <rect x="28" y="520" width="424" height="158" rx="12" fill="#f0ebfe" stroke="#d9ccfb" stroke-width="2"/>
  <text x="240" y="548" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Render outputs</text>
  <rect x="48" y="562" width="384" height="32" rx="8" fill="#ffffff" stroke="#d9ccfb"/>
  <text x="240" y="583" text-anchor="middle" font-size="12.5" fill="#3b2f6b">📊 Excel workbook — 7 sheets, live budget formulas</text>
  <rect x="48" y="600" width="384" height="32" rx="8" fill="#ffffff" stroke="#d9ccfb"/>
  <text x="240" y="621" text-anchor="middle" font-size="12.5" fill="#3b2f6b">🖨️ HTML brochure — stars · distance · Go links · print → PDF</text>
  <rect x="48" y="638" width="384" height="32" rx="8" fill="#ffffff" stroke="#d9ccfb"/>
  <text x="240" y="659" text-anchor="middle" font-size="12.5" fill="#3b2f6b">🗒️ Inline day-by-day itinerary</text>
</svg>
