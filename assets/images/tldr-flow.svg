<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 566" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="TLDR flow: a batch of work ends, you run /tldr or the Stop-hook heartbeat auto-captures the turn, the skill gathers work stats (token estimate plus exact per-subagent tokens, time, rounds, tools), emits a status memo of Done To-do Issues Options plus a fresh-session call, and appends it to a concurrency-safe daily trail. Never fabricates numbers.">
  <rect x="1" y="1" width="478" height="564" rx="18" fill="#f6f8fc" stroke="#dbe2ee"/>
  <text x="240" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#16181d">TLDR</text>
  <text x="240" y="68" text-anchor="middle" font-size="13" fill="#5b6371">End-of-batch status memo that never fabricates numbers</text>

  <!-- Box 1: batch ends -->
  <rect x="28" y="86" width="424" height="66" rx="12" fill="#f0ebfe" stroke="#d9ccfb"/>
  <text x="240" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">A batch of work ends</text>
  <text x="240" y="135" text-anchor="middle" font-size="12.5" fill="#5b6371">Time to decide the next step without re-reading the chat</text>

  <line x1="240" y1="152" x2="240" y2="180" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,173 247,173 240,181" fill="#9aa3b5"/>

  <!-- Box 2: trigger -->
  <rect x="28" y="182" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Run /tldr &#8212; or the Stop hook fires</text>
  <text x="240" y="231" text-anchor="middle" font-size="12.5" fill="#5b6371">A heartbeat auto-captures every turn, no /tldr needed</text>

  <line x1="240" y1="248" x2="240" y2="276" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,269 247,269 240,277" fill="#9aa3b5"/>

  <!-- Box 3: gather stats -->
  <rect x="28" y="278" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Gather the work statistics</text>
  <text x="240" y="327" text-anchor="middle" font-size="12.5" fill="#5b6371">Tokens (est + exact per-subagent), time, rounds, tools</text>

  <line x1="240" y1="344" x2="240" y2="372" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,365 247,365 240,373" fill="#9aa3b5"/>

  <!-- Box 4: status memo (important) -->
  <rect x="28" y="374" width="424" height="66" rx="12" fill="#fff2dd" stroke="#f3c884" stroke-width="2"/>
  <text x="240" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Emit the status memo</text>
  <text x="240" y="423" text-anchor="middle" font-size="12.5" fill="#5b6371">Done / To-do / Issues / Options + fresh-session call</text>

  <line x1="240" y1="440" x2="240" y2="468" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,461 247,461 240,469" fill="#9aa3b5"/>

  <!-- Box 5: daily trail (output) -->
  <rect x="28" y="470" width="424" height="66" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="498" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Append to the daily trail</text>
  <text x="240" y="519" text-anchor="middle" font-size="12.5" fill="#5b6371">Concurrency-safe, one file per day, real wall-clock</text>
</svg>
