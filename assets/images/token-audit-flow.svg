<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 574" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Token Audit flow, top to bottom: run /token-audit; inventory the context sources loaded every session — MCP servers, hooks, the CLAUDE.md chain, skills, agents, plugins and memory; estimate each at roughly bytes divided by 4 tokens; rank the biggest sinks first; return the Top 3 quick wins plus a full reduction plan. Read-only — it proposes, it never changes config without approval.">
  <rect x="1" y="1" width="478" height="572" rx="18" fill="#f6f8fc" stroke="#dbe2ee"/>
  <text x="240" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#16181d">How Token Audit works</text>
  <text x="240" y="68" text-anchor="middle" font-size="13" fill="#5b6371">Read-only — proposes, never changes config without approval.</text>

  <!-- 1 run (purple, start) -->
  <rect x="28" y="86" width="424" height="66" rx="12" fill="#f0ebfe" stroke="#d9ccfb"/>
  <text x="240" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">run /token-audit</text>
  <text x="240" y="135" text-anchor="middle" font-size="12.5" fill="#5b6371">or "why is my context so big?"</text>
  <line x1="240" y1="152" x2="240" y2="180" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,173 247,173 240,181" fill="#9aa3b5"/>

  <!-- 2 inventory -->
  <rect x="28" y="182" width="424" height="74" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">inventory the context sources</text>
  <text x="240" y="231" text-anchor="middle" font-size="12.5" fill="#5b6371">MCP servers · hooks · CLAUDE.md chain</text>
  <text x="240" y="248" text-anchor="middle" font-size="11.5" fill="#5b6371">skills · agents · plugins · memory index</text>
  <line x1="240" y1="256" x2="240" y2="276" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,269 247,269 240,277" fill="#9aa3b5"/>

  <!-- 3 estimate -->
  <rect x="28" y="278" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">estimate each · ~bytes ÷ 4 tokens</text>
  <text x="240" y="327" text-anchor="middle" font-size="12.5" fill="#5b6371">for ranking, not billing — never fabricated</text>
  <line x1="240" y1="344" x2="240" y2="372" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,365 247,365 240,373" fill="#9aa3b5"/>

  <!-- 4 rank (amber, important) -->
  <rect x="28" y="374" width="424" height="66" rx="12" fill="#fff2dd" stroke="#f3c884" stroke-width="2"/>
  <text x="240" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#9a6400">rank the biggest sinks first</text>
  <text x="240" y="423" text-anchor="middle" font-size="12.5" fill="#6b5326">eager? · used here? · quality risk if cut</text>
  <line x1="240" y1="440" x2="240" y2="468" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,461 247,461 240,469" fill="#9aa3b5"/>

  <!-- 5 output (green) -->
  <rect x="28" y="470" width="424" height="74" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="498" text-anchor="middle" font-size="16" font-weight="700" fill="#14704a">Top-3 quick wins + reduction plan</text>
  <text x="240" y="519" text-anchor="middle" font-size="12.5" fill="#2f6b51">est. total reclaim/session vs baseline</text>
  <text x="240" y="536" text-anchor="middle" font-size="11.5" fill="#5b6371">asks before applying · disables, never deletes</text>
</svg>
