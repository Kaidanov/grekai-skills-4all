<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 574" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Setup Memory flow, top to bottom: run Setup-Memory.ps1 against your repo root; it creates memories/repo/ with a MEMORY.md index skeleton; it creates a filesystem junction from ~/.claude/projects/&lt;slug&gt;/memory back into the repo, no admin needed; Claude auto-loads the repo memory every session through that junction; result, memory becomes committed, team-shared and token-efficient.">
  <rect x="1" y="1" width="478" height="572" rx="18" fill="#f6f8fc" stroke="#dbe2ee"/>
  <text x="240" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#16181d">How Setup Memory works</text>
  <text x="240" y="68" text-anchor="middle" font-size="13" fill="#5b6371">Memory-in-repo · idempotent · no admin needed</text>

  <!-- 1 run script (purple, start) -->
  <rect x="28" y="86" width="424" height="66" rx="12" fill="#f0ebfe" stroke="#d9ccfb"/>
  <text x="240" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">run Setup-Memory.ps1</text>
  <text x="240" y="135" text-anchor="middle" font-size="12.5" fill="#5b6371">from your repo root · -ProjectPath defaults to .</text>
  <line x1="240" y1="152" x2="240" y2="180" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,173 247,173 240,181" fill="#9aa3b5"/>

  <!-- 2 create memories/repo -->
  <rect x="28" y="182" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">creates memories/repo/</text>
  <text x="240" y="231" text-anchor="middle" font-size="12.5" fill="#5b6371">+ a MEMORY.md index skeleton in the repo</text>
  <line x1="240" y1="248" x2="240" y2="276" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,269 247,269 240,277" fill="#9aa3b5"/>

  <!-- 3 junction -->
  <rect x="28" y="278" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">creates a filesystem junction</text>
  <text x="240" y="327" text-anchor="middle" font-size="12.5" fill="#5b6371">~/.claude/projects/&lt;slug&gt;/memory → repo</text>
  <line x1="240" y1="344" x2="240" y2="372" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,365 247,365 240,373" fill="#9aa3b5"/>

  <!-- 4 Claude auto-loads (amber, important) -->
  <rect x="28" y="374" width="424" height="66" rx="12" fill="#fff2dd" stroke="#f3c884" stroke-width="2"/>
  <text x="240" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#9a6400">Claude auto-loads repo memory</text>
  <text x="240" y="423" text-anchor="middle" font-size="12.5" fill="#6b5326">every session, through the junction</text>
  <line x1="240" y1="440" x2="240" y2="468" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,461 247,461 240,469" fill="#9aa3b5"/>

  <!-- 5 result (green, output, 3-line) -->
  <rect x="28" y="470" width="424" height="74" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="498" text-anchor="middle" font-size="16" font-weight="700" fill="#14704a">result · memory lives in git</text>
  <text x="240" y="519" text-anchor="middle" font-size="12.5" fill="#2f6b51">committed · team-shared · token-efficient</text>
  <text x="240" y="536" text-anchor="middle" font-size="11.5" fill="#5b6371">clone, re-run, and the context is already there</text>
</svg>
