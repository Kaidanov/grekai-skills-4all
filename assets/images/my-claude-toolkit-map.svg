<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 670" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="My Claude Toolkit component map: helper command-scripts, hooks, a token/cost usage monitor plus dashboard, a sparse-worktree engine, and a sanitized MCP-server inventory, all copied into ~/.claude to bootstrap or restore a machine.">
  <rect x="1" y="1" width="478" height="668" rx="18" fill="#f6f8fc" stroke="#dbe2ee"/>
  <text x="240" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#16181d">My Claude Toolkit</text>
  <text x="240" y="68" text-anchor="middle" font-size="13" fill="#5b6371">All secrets stripped to env-var placeholders.</text>

  <rect x="28" y="86" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Helper command-scripts</text>
  <text x="240" y="135" text-anchor="middle" font-size="12.5" fill="#5b6371">commit-and-pr &amp; verify (PowerShell)</text>

  <rect x="28" y="182" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Hooks</text>
  <text x="240" y="231" text-anchor="middle" font-size="12.5" fill="#5b6371">intake-issue-image + counter; wire into settings.json</text>

  <rect x="28" y="278" width="424" height="66" rx="12" fill="#fff2dd" stroke="#f3c884"/>
  <text x="240" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Token/cost usage monitor + dashboard</text>
  <text x="240" y="327" text-anchor="middle" font-size="12.5" fill="#5b6371">Stop-hook footer, ranker &amp; HTML cost dashboard</text>

  <rect x="28" y="374" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Sparse-worktree engine</text>
  <text x="240" y="423" text-anchor="middle" font-size="12.5" fill="#5b6371">subset-worktree: cone-checkout New-SubsetWorktree</text>

  <rect x="28" y="470" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="498" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Sanitized MCP-server inventory</text>
  <text x="240" y="519" text-anchor="middle" font-size="12.5" fill="#5b6371">names, purpose, required env vars (placeholders only)</text>

  <rect x="28" y="566" width="424" height="74" rx="12" fill="#e7f8f0" stroke="#bfe9d4"/>
  <text x="240" y="594" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Copy into ~/.claude/ (or project .claude/)</text>
  <text x="240" y="615" text-anchor="middle" font-size="12.5" fill="#5b6371">to bootstrap a new machine or restore your setup</text>
  <text x="240" y="632" text-anchor="middle" font-size="11.5" fill="#5b6371">register hooks in settings.json; recreate MCP servers from placeholders</text>
</svg>
