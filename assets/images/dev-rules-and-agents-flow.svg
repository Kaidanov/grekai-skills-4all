<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 662" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Dev Rules and 13-agent roster: drop-in bundle, fold rules into CLAUDE.md and AGENTS.md, copy agents into .claude/agents, a routing standard dispatches each task to the right specialist, ending in consistent standards-driven engineering">
  <rect x="1" y="1" width="478" height="660" rx="18" fill="#f6f8fc" stroke="#dbe2ee"/>
  <text x="240" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#16181d">Dev Rules &amp; 13-Agent Roster</text>
  <text x="240" y="68" text-anchor="middle" font-size="13" fill="#5b6371">drop-in bundle, then route every task to a specialist</text>

  <!-- Stage 1: bundle (start) -->
  <rect x="28" y="86" width="424" height="66" rx="12" fill="#f0ebfe" stroke="#d9ccfb"/>
  <text x="240" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Drop in the bundle</text>
  <text x="240" y="135" text-anchor="middle" font-size="12.5" fill="#5b6371">npx degit into ~/.claude/skills/dev-rules-and-agents</text>
  <line x1="240" y1="152" x2="240" y2="180" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,173 247,173 240,181" fill="#9aa3b5"/>

  <!-- Stage 2: fold rules -->
  <rect x="28" y="182" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Fold rules/* into the repo</text>
  <text x="240" y="231" text-anchor="middle" font-size="12.5" fill="#5b6371">CLAUDE.md / AGENTS.md / .cursor rules</text>
  <line x1="240" y1="248" x2="240" y2="276" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,269 247,269 240,277" fill="#9aa3b5"/>

  <!-- Stage 3: copy agents -->
  <rect x="28" y="278" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Copy agents/* into place</text>
  <text x="240" y="327" text-anchor="middle" font-size="12.5" fill="#5b6371">.claude/agents/ (or .github/agents for Copilot)</text>
  <line x1="240" y1="344" x2="240" y2="372" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,365 247,365 240,373" fill="#9aa3b5"/>

  <!-- Stage 4: routing standard (important) -->
  <rect x="28" y="374" width="424" height="74" rx="12" fill="#fff2dd" stroke="#f3c884" stroke-width="2"/>
  <text x="240" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Routing standard dispatches each task</text>
  <text x="240" y="423" text-anchor="middle" font-size="12.5" fill="#5b6371">project-orchestrator picks the right specialist</text>
  <text x="240" y="440" text-anchor="middle" font-size="11.5" fill="#5b6371">primary router: mapper-refactor-test</text>
  <line x1="240" y1="448" x2="240" y2="468" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,461 247,461 240,469" fill="#9aa3b5"/>

  <!-- Stage 5: roster (normal, tall) -->
  <rect x="28" y="470" width="424" height="74" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="498" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">The 13-agent roster</text>
  <text x="240" y="519" text-anchor="middle" font-size="12.5" fill="#5b6371">frontend-dev / backend-dev / refactor-test-guardian</text>
  <text x="240" y="536" text-anchor="middle" font-size="11.5" fill="#5b6371">qa-test-engineer / security-specialist / devops-engineer / + more</text>
  <line x1="240" y1="544" x2="240" y2="564" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,557 247,557 240,565" fill="#9aa3b5"/>

  <!-- Stage 6: output (green) -->
  <rect x="28" y="566" width="424" height="66" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="594" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Consistent, standards-driven engineering</text>
  <text x="240" y="615" text-anchor="middle" font-size="12.5" fill="#5b6371">behavior-preserving, proof-oriented, repeatable</text>
</svg>
