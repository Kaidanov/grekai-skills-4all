<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="56" text-anchor="middle" font-size="34" font-weight="700" fill="#16181d">The No-Repo Architecture: Serverless AI Collaboration</text>

  <!-- Left header -->
  <text x="300" y="118" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="1" fill="#3a3f4b">THE ARCHITECTURAL PILLARS</text>
  <!-- Right header -->
  <text x="900" y="118" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="1" fill="#3a3f4b">THE COLLABORATIVE WORKFLOW</text>

  <!-- ===== Pillars (cycle of 4) ===== -->
  <!-- Pillar 1 -->
  <circle cx="200" cy="220" r="56" fill="#e8f0ff" stroke="#7c5cff" stroke-width="2"/>
  <text x="200" y="228" text-anchor="middle" font-size="30">🗂️</text>
  <text x="200" y="312" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">Persistence via</text>
  <text x="200" y="332" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">Shared Sync Drives</text>
  <text x="200" y="356" text-anchor="middle" font-size="12.5" fill="#5b6371">Dropbox / Google Drive /</text>
  <text x="200" y="373" text-anchor="middle" font-size="12.5" fill="#5b6371">OneDrive handle all file</text>
  <text x="200" y="390" text-anchor="middle" font-size="12.5" fill="#5b6371">distribution and syncing.</text>

  <!-- Pillar 2 -->
  <circle cx="430" cy="220" r="56" fill="#eafaf4" stroke="#36c2a8" stroke-width="2"/>
  <text x="430" y="230" text-anchor="middle" font-size="30">🤖</text>
  <text x="430" y="312" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">The Agentic</text>
  <text x="430" y="332" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">Orchestrator (MCP)</text>
  <text x="430" y="356" text-anchor="middle" font-size="12.5" fill="#5b6371">Claude connects to local</text>
  <text x="430" y="373" text-anchor="middle" font-size="12.5" fill="#5b6371">directories via the Model</text>
  <text x="430" y="390" text-anchor="middle" font-size="12.5" fill="#5b6371">Context Protocol.</text>

  <!-- Pillar 3 -->
  <circle cx="200" cy="470" r="56" fill="#fff3e8" stroke="#ff9f43" stroke-width="2"/>
  <text x="200" y="480" text-anchor="middle" font-size="30">📝</text>
  <text x="200" y="562" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">Stateful HTML via</text>
  <text x="200" y="582" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">File System Access API</text>
  <text x="200" y="606" text-anchor="middle" font-size="12.5" fill="#5b6371">Browser APIs let JavaScript</text>
  <text x="200" y="623" text-anchor="middle" font-size="12.5" fill="#5b6371">read and write a local</text>
  <text x="200" y="640" text-anchor="middle" font-size="12.5" fill="#5b6371">sidecar state file.</text>

  <!-- Pillar 4 -->
  <circle cx="430" cy="470" r="56" fill="#f3eaff" stroke="#7c5cff" stroke-width="2"/>
  <text x="430" y="480" text-anchor="middle" font-size="30">🎨</text>
  <text x="430" y="562" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">Figma-Style</text>
  <text x="430" y="582" text-anchor="middle" font-size="15" font-weight="700" fill="#16181d">UI Overlay</text>
  <text x="430" y="606" text-anchor="middle" font-size="12.5" fill="#5b6371">Self-contained JS for comment</text>
  <text x="430" y="623" text-anchor="middle" font-size="12.5" fill="#5b6371">pins, AI prompt drafts</text>
  <text x="430" y="640" text-anchor="middle" font-size="12.5" fill="#5b6371">and approvals.</text>

  <!-- cycle arrows -->
  <path d="M262 205 q60 -30 110 0" fill="none" stroke="#c7ccd6" stroke-width="2.5" marker-end="url(#ar)"/>
  <path d="M430 282 v120" fill="none" stroke="#c7ccd6" stroke-width="2.5" marker-end="url(#ar)"/>
  <path d="M372 470 h-110" fill="none" stroke="#c7ccd6" stroke-width="2.5" marker-end="url(#ar)"/>
  <path d="M200 408 v-126" fill="none" stroke="#c7ccd6" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- ===== Workflow (4 steps) ===== -->
  <g>
    <rect x="700" y="160" width="400" height="78" rx="12" fill="#f7f8fa" stroke="#e2e5ea"/>
    <circle cx="730" cy="199" r="16" fill="#7c5cff"/><text x="730" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">1</text>
    <text x="760" y="192" font-size="15" font-weight="700" fill="#16181d">Generation</text>
    <text x="760" y="214" font-size="12.5" fill="#5b6371">Agent creates the deck HTML, overlay and state logic.</text>

    <rect x="700" y="258" width="400" height="78" rx="12" fill="#f7f8fa" stroke="#e2e5ea"/>
    <circle cx="730" cy="297" r="16" fill="#36c2a8"/><text x="730" y="303" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">2</text>
    <text x="760" y="290" font-size="15" font-weight="700" fill="#16181d">Distribution</text>
    <text x="760" y="312" font-size="12.5" fill="#5b6371">HTML + empty state.json land in the shared cloud folder.</text>

    <rect x="700" y="356" width="400" height="78" rx="12" fill="#f7f8fa" stroke="#e2e5ea"/>
    <circle cx="730" cy="395" r="16" fill="#ff9f43"/><text x="730" y="401" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">3</text>
    <text x="760" y="388" font-size="15" font-weight="700" fill="#16181d">Human Collaboration</text>
    <text x="760" y="410" font-size="12.5" fill="#5b6371">Comments &amp; prompts update state.json, syncing to all.</text>

    <rect x="700" y="454" width="400" height="78" rx="12" fill="#f7f8fa" stroke="#e2e5ea"/>
    <circle cx="730" cy="493" r="16" fill="#7c5cff"/><text x="730" y="499" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">4</text>
    <text x="760" y="486" font-size="15" font-weight="700" fill="#16181d">Agentic Execution</text>
    <text x="760" y="508" font-size="12.5" fill="#5b6371">Agent reads approved JSON and rewrites the HTML.</text>
  </g>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#c7ccd6"/>
    </marker>
  </defs>
</svg>
