<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="700" fill="#fdf8ef"/>
  <text x="600" y="52" text-anchor="middle" font-size="32" font-weight="700" fill="#16181d">The No-Repo Architecture: Serverless AI-Driven Collaboration</text>

  <text x="250" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#3a3f4b">The 4 Pillars of No-Repo Architecture</text>
  <text x="950" y="104" text-anchor="middle" font-size="18" font-weight="700" fill="#3a3f4b">The Collaborative Workflow</text>

  <!-- Pillar cards (left) -->
  <g>
    <rect x="40" y="130" width="430" height="120" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
    <text x="64" y="168" font-size="16" font-weight="700" fill="#16181d">Stateful HTML (File System Access API)</text>
    <text x="64" y="194" font-size="13" fill="#5b6371">JavaScript updates a sidecar state.json file</text>
    <text x="64" y="213" font-size="13" fill="#5b6371">directly on the user's machine — read/write access.</text>
    <text x="64" y="238" font-size="13" font-weight="600" fill="#7c5cff">📄 sidecar: state.json</text>

    <rect x="40" y="266" width="430" height="150" rx="12" fill="#eafaf4" stroke="#cdeee3"/>
    <text x="64" y="304" font-size="16" font-weight="700" fill="#16181d">The Figma-Style UI Overlay</text>
    <text x="64" y="330" font-size="13" fill="#5b6371">Generated HTML includes self-contained JS for</text>
    <text x="64" y="349" font-size="13" fill="#5b6371">comments, prompts and approvals.</text>
    <text x="64" y="378" font-size="13" fill="#16181d">📌 Comment Pins</text>
    <text x="240" y="378" font-size="13" fill="#16181d">🤖 AI Prompt Draft</text>
    <text x="64" y="400" font-size="13" fill="#16181d">✅ Assign Approvers</text>

    <rect x="40" y="432" width="430" height="150" rx="12" fill="#fff3e3" stroke="#f6e2c4"/>
    <text x="64" y="470" font-size="16" font-weight="700" fill="#16181d">The Agentic Orchestrator (MCP)</text>
    <text x="64" y="496" font-size="13" fill="#5b6371">Claude Desktop connects via a local File System</text>
    <text x="64" y="515" font-size="13" fill="#5b6371">MCP server to read and edit files.</text>
    <text x="64" y="548" font-size="13" font-weight="600" fill="#16181d">🧠 Claude Desktop → 🔌 MCP Server → 🗂️ Folder</text>
  </g>

  <!-- Persistence layer (center) -->
  <g>
    <ellipse cx="600" cy="200" rx="92" ry="58" fill="#eef2f7" stroke="#d6dde7"/>
    <text x="600" y="190" text-anchor="middle" font-size="24">☁️</text>
    <text x="600" y="222" text-anchor="middle" font-size="11.5" fill="#3a3f4b">Drive · OneDrive · Dropbox</text>
    <text x="600" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#16181d">The Persistence Layer</text>
    <text x="600" y="307" text-anchor="middle" font-size="12" fill="#5b6371">(Shared Sync Drive)</text>
    <line x1="600" y1="258" x2="600" y2="560" stroke="#d6dde7" stroke-width="2.5" stroke-dasharray="5 5"/>
  </g>

  <!-- Workflow steps (right) -->
  <g>
    <text x="730" y="168" font-size="16" font-weight="700" fill="#16181d">1. Generation</text>
    <text x="730" y="190" font-size="12.5" fill="#5b6371">Agent creates initial HTML, UI overlay and state logic.</text>

    <text x="730" y="262" font-size="16" font-weight="700" fill="#16181d">2. Distribution</text>
    <text x="730" y="284" font-size="12.5" fill="#5b6371">.html + empty .json saved to the shared cloud folder.</text>

    <text x="730" y="356" font-size="16" font-weight="700" fill="#16181d">3. Human Collaboration</text>
    <text x="730" y="378" font-size="12.5" fill="#5b6371">Colleagues open the local file; comments update</text>
    <text x="730" y="396" font-size="12.5" fill="#5b6371">state.json, instantly syncing to the team.</text>

    <text x="730" y="470" font-size="16" font-weight="700" fill="#16181d">4. Agentic Execution</text>
    <text x="730" y="492" font-size="12.5" fill="#5b6371">Agent reviews approved state.json via MCP and</text>
    <text x="730" y="510" font-size="12.5" fill="#5b6371">rewrites the HTML to finalize the design.</text>
  </g>
</svg>
