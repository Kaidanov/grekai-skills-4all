<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 662" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Session Handoff full flow: a working session nearly out of context, you say hand off, the skill writes a dated handoff doc plus a standalone resume prompt plus an appended session-log.csv metrics row under docs/handoffs and commits, then the next session pastes the resume prompt and resumes with zero re-research">
  <rect x="1" y="1" width="478" height="660" rx="18" fill="#f6f8fc" stroke="#dbe2ee"/>
  <text x="240" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#16181d">Session Handoff</text>
  <text x="240" y="68" text-anchor="middle" font-size="13" fill="#5b6371">End one session, resume the next with zero re-research</text>

  <!-- Box 1: start -->
  <rect x="28" y="86" width="424" height="66" rx="12" fill="#f0ebfe" stroke="#d9ccfb"/>
  <text x="240" y="114" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Working session, nearly out of context</text>
  <text x="240" y="135" text-anchor="middle" font-size="12.5" fill="#5b6371">Real progress made, but state lives only in the chat</text>

  <line x1="240" y1="152" x2="240" y2="180" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,173 247,173 240,181" fill="#9aa3b5"/>

  <!-- Box 2: invoke -->
  <rect x="28" y="182" width="424" height="66" rx="12" fill="#eaf1fb" stroke="#cfe0f7"/>
  <text x="240" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">You say "hand off"</text>
  <text x="240" y="231" text-anchor="middle" font-size="12.5" fill="#5b6371">Skill gathers branch, commits, todos, metrics (read-only)</text>

  <line x1="240" y1="248" x2="240" y2="276" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,269 247,269 240,277" fill="#9aa3b5"/>

  <!-- Box 3: artifact handoff doc -->
  <rect x="28" y="278" width="424" height="66" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="306" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Handoff doc</text>
  <text x="240" y="327" text-anchor="middle" font-size="12.5" fill="#5b6371">Done, in-progress, next + safe approach + proof gate</text>

  <line x1="240" y1="344" x2="240" y2="372" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,365 247,365 240,373" fill="#9aa3b5"/>

  <!-- Box 4: artifact resume prompt -->
  <rect x="28" y="374" width="424" height="66" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Resume prompt</text>
  <text x="240" y="423" text-anchor="middle" font-size="12.5" fill="#5b6371">One copy-paste block, self-contained, restates rules</text>

  <line x1="240" y1="440" x2="240" y2="468" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,461 247,461 240,469" fill="#9aa3b5"/>

  <!-- Box 5: artifact session-log row -->
  <rect x="28" y="470" width="424" height="66" rx="12" fill="#e7f8f0" stroke="#bfe9d4" stroke-width="2"/>
  <text x="240" y="498" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">session-log.csv row</text>
  <text x="240" y="519" text-anchor="middle" font-size="12.5" fill="#5b6371">One appended metrics row, then all three committed</text>

  <line x1="240" y1="536" x2="240" y2="564" stroke="#9aa3b5" stroke-width="2"/>
  <polygon points="233,557 247,557 240,565" fill="#9aa3b5"/>

  <!-- Box 6: next session -->
  <rect x="28" y="566" width="424" height="66" rx="12" fill="#fff2dd" stroke="#f3c884" stroke-width="2"/>
  <text x="240" y="594" text-anchor="middle" font-size="16" font-weight="700" fill="#16181d">Next session resumes cold</text>
  <text x="240" y="615" text-anchor="middle" font-size="12.5" fill="#5b6371">Paste the resume prompt, continue with zero re-research</text>
</svg>
